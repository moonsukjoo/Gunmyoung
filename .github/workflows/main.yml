name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install-dependencies
        run: |
          npm install
          npm install @capacitor/assets @capacitor/cli @capacitor/android

      - name: build-web
        run: npm run build

      - name: capacitor-init
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || echo "skip"
          npx cap add android || echo "skip"

      - name: prepare-assets
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/splash.png

      - name: generate-resources
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: capacitor-sync
        run: npx cap sync android

      - name: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: build-apk
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: upload-apk
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
