name: Build Android APK (Final Fix v2)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          # 1. 기본 패키지 설치
          npm install --legacy-peer-deps
          # 2. 에러가 났던 누락된 부품(react-is) 강제 설치 ★핵심 포인트★
          npm install react-is --legacy-peer-deps
          # 3. 안드로이드 변환 도구 설치
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Init & Android Add
        run: |
          npx cap init "GeonmyeongHRM" "com.geonmyeong.hrm" --web-dir dist --confirm
          npx cap add android

      - name: Copy Web to Android
        run: npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Geonmyeong-HRM-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
