name: Build Android APK (건명)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 패키지 설치
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: Capacitor 초기화 및 안드로이드 플랫폼 추가
        # 에러가 나도 진행되게 하되, 어떤 상태인지 로그에 남깁니다.
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || echo "이미 초기화됨"
          npx cap add android || echo "안드로이드 플랫폼이 이미 존재함"

      - name: 앱 에셋 준비 (아이콘/스플래시)
        # || true를 제거했습니다. 만약 public/company_logo.png 파일이 없다면 여기서 빌드가 멈추고 알려줍니다.
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          cp public/company_logo.png assets/splash.png
          cp public/company_logo.png assets/splash-dark.png
          
      - name: 앱 아이콘 및 스플래시 생성
        # 안드로이드 플랫폼이 추가된 상태에서 아이콘을 덮어씌웁니다.
        # 에러를 무시하지 않도록 || true를 뺐습니다.
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Capacitor 최종 싱크
        # 생성된 아이콘과 각종 설정을 안드로이드 프로젝트에 완벽하게 동기화합니다.
        run: npx cap sync android

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
