name: Build Android APK (Final Fix)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 경고를 없애기 위해 최신 버전인 24로 올렸습니다!

      - name: Install Dependencies
        run: |
          # 버전 충돌을 무시하고 강제로 설치하는 옵션을 추가했습니다
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Init & Android Add
        run: |
          # 혹시 모를 폴더 꼬임 방지
          npx cap init "GeonmyeongHRM" "com.geonmyeong.hrm" --web-dir dist --confirm
          npx cap add android

      - name: Copy Web to Android
        run: npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Geonmyeong-HRM-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
