name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (버전 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 의존성 설치
        run: |
          npm install
          npm install @capacitor/assets @capacitor/cli @capacitor/android

      - name: 웹 프로젝트 빌드
        # 여기서 생성된 dist 폴더가 앱 내부 화면이 됩니다.
        run: npm run build

      - name: Capacitor 프로젝트 설정
        run: |
          npx cap init "건명기업 HRM" "com.gun.app" --web-dir dist || true
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 앱 에셋 준비 (핵심 원인 해결)
        # 알 수 없는 icon.png 대신, 확실하게 존재하는 public/company_logo.png로 모든 에셋을 덮어씌웁니다.
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          cp public/company_logo.png assets/splash.png
          cp public/company_logo.png assets/splash-dark.png

      - name: 안드로이드 네이티브 에셋 생성
        # 실제 안드로이드 리소스(res 폴더)에 건명 로고를 박아 넣습니다.
        run: npx -y @capacitor/assets generate --android --assetPath assets

      - name: Capacitor 싱크 및 리소스 동기화
        # 웹 빌드 결과물(dist)과 생성된 에셋을 안드로이드 프로젝트에 완벽하게 복사합니다.
        run: npx cap sync android

      - name: 중복 클래스 및 빌드 에러 해결
        run: |
          echo "configurations.all { resolutionStrategy { force 'androidx.core:core:1.13.1'; force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } }" >> android/app/build.gradle
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Java JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
