name: Build Android APK (건명)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 패키지 설치
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: 빌드 폴더 정리 (dist 폴더 생성)
        run: |
          mkdir -p dist
          cp -r out/* dist/ 2>/dev/null || true
          cp -r build/* dist/ 2>/dev/null || true

      - name: Capacitor 초기화 및 앱 이름(건명) 지정
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || true
          npx cap add android || true

      - name: 📱 앱 아이콘 생성 (에러 수정 버전)
        run: |
          # 1. 라이브러리가 기본으로 인식하는 assets 폴더 생성
          mkdir -p assets
          # 2. public에 있는 로고를 assets/icon.png로 복사
          cp public/company_logo.png assets/icon.png
          # 3. 옵션 없이 실행하여 안드로이드 아이콘 자동 생성
          npx @capacitor/assets generate --android

      - name: Capacitor 싱
