name: Build Installable Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-is --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Init
        run: npx cap init "GeonmyeongHRM" "com.geonmyeong.hrm" --web-dir dist

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Web to Android
        run: npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK (Debug Version)
        run: |
          cd android
          chmod +x gradlew
          # assembleRelease 대신 assembleDebug를 써서 설치 가능하게 만듭니다.
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Geonmyeong-HRM-Installable
          # 경로가 debug 폴더로 변경되었습니다.
          path: android/app/build/outputs/apk/debug/app-debug.apk
