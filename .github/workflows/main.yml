name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (버전 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 의존성 설치
        run: |
          npm install
          npm install @capacitor/assets @capacitor/cli @capacitor/android

      - name: 웹 프로젝트 빌드 (Vite base: './' 적용됨)
        # vite.config.ts의 base: './' 설정 덕분에 APK 내에서 경로를 제대로 찾게 됩니다.
        run: npm run build

      - name: Capacitor 프로젝트 설정
        run: |
          npx cap init "건명기업 HRM" "com.gun.app" --web-dir dist || true
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 앱 에셋 준비 (아이콘 및 스플래시)
        # 업로드하신 assets/splash.png와 public/company_logo.png를 활용합니다.
        run: |
          mkdir -p assets
          # 아이콘 소스: public/company_logo.png 사용
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          
          # 스플래시 소스: 2732x2732 이미지가 있으면 사용, 없으면 로고로 대체
          if [ -f "assets/splash.png" ]; then
            echo "Using custom splash.png"
            cp assets/splash.png assets/splash-dark.png
          else
            cp public/company_logo.png assets/splash.png
            cp public/company_logo.png assets/splash-dark.png
          fi

      - name: 안드로이드 네이티브 에셋 생성
        # 실제 안드로이드 리소스 폴더에 건명 로고와 스플래시를 생성합니다.
        run: npx -y @capacitor/assets generate --android --assetPath assets

      - name: Capacitor 싱크 및 리소스 동기화
        run: npx cap sync android

      - name: 중복 클래스 및 빌드 에러 해결
        run: |
          echo "configurations.all { resolutionStrategy { force 'androidx.core:core:1.13.1'; force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } }" >> android/app/build.gradle
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Java JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
