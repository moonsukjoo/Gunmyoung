name: Build Android APK (건명)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 안정적인 LTS 버전 권장

      - name: 의존성 패키지 설치
        run: |
          npm install
          # 에셋 생성 도구를 최신 버전으로 확실히 설치
          npm install @capacitor/assets @capacitor/cli @capacitor/android

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: Capacitor 프로젝트 초기화 및 플랫폼 추가
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || echo "이미 초기화됨"
          npx cap add android || echo "안드로이드 플랫폼이 이미 존재함"

      - name: 앱 에셋 강제 준비 (핵심)
        # @capacitor/assets가 인식하는 표준 파일명으로 assets 폴더에 복사합니다.
        run: |
          mkdir -p assets
          # 원본 로고 이미지는 최소 1024x1024여야 합니다.
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          cp public/company_logo.png assets/splash.png
          cp public/company_logo.png assets/splash-dark.png

      - name: 안드로이드 리소스 생성 및 덮어쓰기
        # 이 단계에서 android/app/src/main/res 내부의 모든 아이콘을 실제로 바꿉니다.
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Capacitor 동기화
        # 생성된 리소스들을 안드로이드 프로젝트에 최종 반영합니다.
        run: npx cap sync android

      - name: Java 설정 (JDK 17 이상 권장)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          # 리소스를 새로고침하기 위해 clean 후 빌드 권장
          ./gradlew clean assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
