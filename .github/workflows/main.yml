name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: |
          npm install
          npm install @capacitor/assets @capacitor/cli @capacitor/android

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: Capacitor 프로젝트 설정
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || echo "skip"
          npx cap add android || echo "skip"

      - name: 앱 에셋 준비 (아이콘)
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          cp public/company_logo.png assets/splash.png
          cp public/company_logo.png assets/splash-dark.png

      - name: 안드로이드 아이콘 생성
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: 중복 클래스 에러 해결 (핵심 수정)
        # Gradle 빌드 시 중복된 라이브러리 충돌을 강제로 해결하는 코드를 주입합니다.
        run: |
          echo "configurations.all { resolutionStrategy { force 'androidx.core:core:1.13.1'; force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } }" >> android/app/build.gradle
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Capacitor 싱크
        run: npx cap sync android

      - name: Java JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
