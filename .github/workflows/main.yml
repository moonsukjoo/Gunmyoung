name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 패키지 설치
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android @capacitor/assets

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: Capacitor 프로젝트 설정
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || echo "skip"
          npx cap add android || echo "skip"

      - name: 앱 에셋 준비 (아이콘 및 스플래시)
        # public/company_logo.png를 원본으로 사용합니다.
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          cp public/company_logo.png assets/icon-only.png
          cp public/company_logo.png assets/icon-foreground.png
          cp public/company_logo.png assets/icon-background.png
          cp public/company_logo.png assets/splash.png
          cp public/company_logo.png assets/splash-dark.png

      - name: 안드로이드 아이콘 생성
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Capacitor 동기화
        run: npx cap sync android

      - name: Java JDK 17 설정 (컴파일 에러 해결 핵심)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Capacitor 6+ 환경에서 가장 안정적입니다.
          cache: 'gradle'

      - name: 안드로이드 APK 빌드
        # JAVA_HOME을 명시적으로 전달하여 컴파일 에러를 방지합니다.
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 빌드 결과물(APK) 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
